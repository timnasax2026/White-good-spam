<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE GOOD BAN CHECK 🧌🦠</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000 url('https://wallpaperaccess.com/full/1231613.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }
        .card {
            position: relative;
            z-index: 10;
            background: rgba(20, 0, 0, 0.9);
            border: 2px solid #ff0000;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 20px #ff0000;
        }
        h1 { font-family: 'Creepster', cursive; color: #ff0000; font-size: 2rem; }
        img { width: 150px; border-radius: 50%; border: 3px solid #ff0000; margin: 15px 0; }
        input, select {
            width: 100%; padding: 10px; margin: 10px 0;
            background: #111; border: 1px solid #ff0000; color: #00ff00;
        }
        button {
            width: 100%; padding: 15px; background: #8b0000; color: white;
            font-weight: bold; border: none; cursor: pointer; text-transform: uppercase;
        }
        button:hover { background: red; box-shadow: 0 0 10px red; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <h1>WHITE GOOD BAN CHECK 🧌🦠</h1>
        <img src="https://telegra.ph/file/07f7c4613c233157f49a2.jpg" alt="Jiren">
        <select id="country">
            <option value="255">Tanzania (+255)</option>
            <option value="254">Kenya (+254)</option>
        </select>
        <input type="number" id="phone" placeholder="Enter number...">
        <button onclick="check()">EXECUTE BAN CHECK 💀</button>
    </div>
    <script>
        function check() {
            const n = document.getElementById('phone').value;
            if(!n) return alert("Enter number! ☠️");
            alert("SYSTEM SCANNING " + n + "... STICK AROUND!");
        }
    </script>
</body>
</html>
