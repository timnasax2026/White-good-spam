<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --blood: #ff0000; --dark: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--dark); color: var(--neon); font-family: 'Courier Prime', monospace; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
        .header { background: rgba(255, 0, 0, 0.1); border-bottom: 2px solid var(--blood); padding: 15px; text-align: center; box-shadow: 0 0 20px red; }
        h1 { font-family: 'Creepster', cursive; color: var(--blood); font-size: 2.2rem; }
        .main-container { display: grid; grid-template-columns: 400px 1fr; height: 100%; }
        .sidebar { background: rgba(0, 0, 0, 0.9); border-right: 1px solid var(--blood); padding: 20px; overflow-y: auto; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        select, input { width: 100%; background: #080808; border: 1px solid #444; color: var(--neon); padding: 12px; font-size: 0.9rem; outline: none; border-radius: 5px; }
        .btn-launch { background: var(--blood); color: white; border: none; padding: 20px; font-family: 'Creepster', cursive; font-size: 1.8rem; cursor: pointer; width: 100%; margin-top: 10px; box-shadow: 0 0 30px red; }
        .terminal { background: rgba(0, 5, 0, 0.98); padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        #log-screen { flex-grow: 1; font-size: 0.75rem; color: #00ff41; line-height: 1.5; overflow-y: hidden; }
        .status-box { margin-top: auto; border-top: 1px solid #333; padding-top: 20px; text-align: center; }
        .percent { font-size: 4rem; color: var(--blood); font-weight: bold; text-shadow: 0 0 20px red; }
        .scam-alert { display: none; color: white; background: red; padding: 20px; font-weight: bold; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; animation: blink 0.1s infinite; border: 5px solid white; text-align: center; }
        @keyframes blink { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="header">
    <h1>BUG-X GOD-MODE: SYSTEM OVERRIDE ☣️</h1>
</div>

<div class="main-container">

        </div>

        <div class="input-group">

            <select id="payload">

                <option value="RAT_REMOTE">Remote Access Trojan (RAT)</option>

                <option value="CAM_HIJACK">Camera/Mic Hijack 📸</option>
                <option value="DDoS_PACKET">DDoS Packet Overflow</option>
                <option value="KEYLOGGER">Stealth Keylogger v2</option>
                <option value="WORM_SPREAD">Self-Replicating Worm</option>
                <optgroup label="Advanced Exploits">
                    <option value="ZOKOU_BYPASS">Zokou Framework Bypass</option>
                    <option value="FB_PHISH">Facebook Meta Phisher</option>
                    <option value="IG_HACK">Instagram Session Stealer</option>
                    <option value="CRYPTO_DRAIN">Crypto Wallet Drainer</option>
                    <option value="SMS_SPOOF">SMS Spoofing Gateway</option>
                    <option value="OTP_BYPASS">OTP Authentication Bypass</option>
                    <option value="SQL_INJECT">SQL Injection Master</option>
                    <option value="ROOT_ACCESS">Android Root Access</option>
                    <option value="IOS_KERNEL">iOS Kernel Exploit</option>
                </optgroup>
                <optgroup label="System Crasher">
                    <option value="BATTERY_OVERLOAD">Battery Cell Overload</option>
                    <option value="CPU_STRESS">CPU 100% Stress Test</option>
                    <option value="RAM_EATER">RAM Memory Eater</option>
                    <option value="BOOT_LOOP">Infinite Boot Loop</option>
                </optgroup>
                <option value="PROXY_HOP">Global Proxy Hopper</option>
                <option value="MAC_SPOOFER">MAC Address Spoofer</option>
                <option value="WIFI_BREACH">WPA3 Security Breach</option>
                <option value="DARK_WEB_P1">Dark Web Portal v1</option>
                <option value="SAT_HIJACK">Satellite Signal Hijack</option>
            </select>
        </div>

        <div class="input-group">
            <label>3. Attack Intensity (1M - 10M Data)</label>
            <input type="number" id="intensity" value="10000000">
        </div>

        <button class="btn-launch" onclick="initiateGodMode()">EXECUTE ATTACK ☠️</button>
    </div>

    <div class="terminal">
        <div id="log-screen">> SYSTEM IDLE... WAITING FOR COMMAND...</div>
        <div class="status-box" id="stat-box" style="display:none;">
            <label>Attack Progress</label>
            <div class="percent" id="perc">0%</div>
            <p style="font-size: 0.6rem;">INJECTING 10,000,000 DATA PACKETS...</p>
        </div>
    </div>
</div>

<div class="scam-alert" id="alert-box">
    <h1>☣️ SCAM COMPLETED ☣️</h1>
    <p>TARGET +<span id="victim-id"></span> INFECTED SUCCESSFULLY!</p>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px; cursor:pointer;">RESTART SYSTEM</button>
</div>

<script>
    // 1. Matrix Background Logic
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const alphabet = "TIMNASA TMD 666 ERROR SCAM VIRUS 0101";
    const drops = Array(Math.floor(canvas.width/20)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);

    // 2. Real-Time Log Streaming (Inatengeneza maneno mamilioni)
    const logScreen = document.getElementById('log-screen');
    function log(msg) {
        const div = document.createElement('div');
        div.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
        logScreen.prepend(div);
        if(logScreen.childNodes.length > 50) logScreen.lastChild.remove();
    }

    function initiateGodMode() {
        const target = document.getElementById('target').value;
        const payload = document.getElementById('payload').value;
        if(!target) return alert("SPECIFY TARGET!");

        document.getElementById('stat-box').style.display = 'block';
        document.getElementById('victim-id').innerText = target;
        let progress = 0;

        const timer = setInterval(() => {
            progress += 0.2; // Slow countdown for realistic feel
            document.getElementById('perc').innerText = Math.floor(progress) + "%";
            
            // Hapa tunashusha logs za kutisha
            log(`Attacking target via ${payload} gateway...`);
            log(`Infecting node 0x${Math.random().toString(16).slice(2,8).toUpperCase()}...`);
            log(`Bypassing 2FA protocol for +${target}...`);
            log(`Sending payload chunk: ${Math.random().toString(36).substring(7)}...`);

            if(progress >= 100) {
                clearInterval(timer);
                document.getElementById('alert-box').style.display = 'block';
            }
        }, 100);
    }

    // [ DATA PADDING - GITHUB 1000 LINES SIMULATION ]
    // Hapa nimeongeza comment ndefu ili faili liwe na mistari mingi
    // LINE 200: Initialize...
    // LINE 201: System Breach...
    // (Nakili hii mistari chini kwenye faili lako ili ifike 1000+)
</script>
