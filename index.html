<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELL'S BAN REGISTRY 🧌🩸💀</title>
    <style>
        * { box-sizing: border-box; cursor: crosshair; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Creepster', 'Nosifer', cursive, sans-serif; /* Unahitaji font za kutisha */
            background-color: #000;
            /* Picha ya background ya Kuzimu/Moto */
            background-image: url('https://images.unsplash.com/photo-1579308104276-8f3358df5894?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ff4d4d;
            overflow: hidden;
        }

        /* Kuongeza vumbi la damu nyuma */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(139,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        .main-card {
            width: 100%;
            max-width: 400px;
            background: rgba(10, 0, 0, 0.9);
            border-radius: 10px;
            padding: 30px;
            border: 3px solid #8b0000;
            text-align: center;
            position: relative;
            box-shadow: 0 0 50px #8b0000;
            backdrop-filter: blur(5px);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 50px #8b0000; }
            50% { box-shadow: 0 0 80px #ff0000; }
            100% { box-shadow: 0 0 50px #8b0000; }
        }

        .status-top {
            background: linear-gradient(90deg, #ff0000, #ff8000, #ff0000);
            height: 15px;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 10px 10px 0 0;
        }

        .title-header {
            margin-top: 15px;
            font-size: 2rem;
            font-weight: bold;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #ff0000, 2px 2px 2px #000;
            margin-bottom: 20px;
        }

        .img-container {
            margin: 20px 0;
            position: relative;
        }

        /* Picha ya Jiren yenye muonekano wa giza/damu */
        .character-img {
            width: 100%;
            max-width: 280px;
            border-radius: 50%;
            border: 5px solid #8b0000;
            filter: grayscale(100%) brightness(50%) sepia(100%) hue-rotate(-50deg) saturate(500%);
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.8);
        }

        .img-container::after {
            content: "☠️";
            position: absolute;
            bottom: -10px;
            right: 20%;
            font-size: 2rem;
        }

        .ui-body {
            padding: 10px;
        }

        .sub-text {
            font-size: 1rem;
            color: #b3b3b3;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-family: sans-serif;
            font-weight: bold;
        }

        select, .phone-input-row input {
            background: rgba(20, 0, 0, 0.8);
            color: #ff4d4d;
            border: 2px solid #550000;
            padding: 12px;
            outline: none;
            transition: 0.3s;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
        }

        select:focus, input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .country-dropdown {
            width: 100%;
            margin-bottom: 25px;
        }

        .phone-input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }

        .prefix-box { 
            width: 35%; 
            text-align: center; 
            color: #888; 
            border-style: dashed;
        }
        
        .number-box { 
            width: 65%; 
        }

        .btn-action {
            background: linear-gradient(180deg, #8b0000 0%, #4a0000 100%);
            color: #fff;
            border: 3px solid #ff0000;
            padding: 20px;
            width: 100%;
            font-weight: 900;
            font-size: 1.3rem;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Creepster', sans-serif;
            text-shadow: 2px 2px 4px #000;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: linear-gradient(180deg, #ff0000 0%, #8b0000 100%);
            box-shadow: 0 0 30px #ff0000;
            transform: scale(1.03) rotate(-1deg);
        }

        /* Load google fonts za kutisha */
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&display=swap');
    </style>
</head>
<body>

    <div class="main-card">
        <div class="status-top"></div>
        
        <div class="title-header">
            HELL'S BAN REGISTRY 🧌🩸☠️
        </div>

        <div class="img-container">
            <img src="https://telegra.ph/file/07f7c4613c233157f49a2.jpg" alt="Demon Guardian" class="character-img">
        </div>

        <div class="ui-body">
            <p class="sub-text">IDENTIFY THE DAMNED SOUL (Select Country)</p>
            
            <select class="country-dropdown" id="countrySelect">
                <option value="255">Tanzania (+255)</option>
                <option value="243">DRC (+243)</option>
                <option value="254">Kenya (+254)</option>
                <option value="256">Uganda (+256)</option>
                <option value="1">USA (+1)</option>
            </select>

            <div class="phone-input-row">
                <input type="text" class="prefix-box" id="prefixVal" value="+ 255" readonly>
                <input type="number" class="number-box" id="phoneNum" placeholder="Phone Number...">
            </div>

            <button class="btn-action" onclick="verifyAction()">EXECUTE BAN CHECK ⚰️🔥</button>
        </div>
    </div>

    <script>
        const select = document.getElementById('countrySelect');
        const prefix = document.getElementById('prefixVal');

        select.addEventListener('change', () => {
            prefix.value = "+ " + select.value;
        });

        function verifyAction() {
            const num = document.getElementById('phoneNum').value;
            if(!num) {
                alert("ENTER THE NUMBER OR FACE ETERNAL DAMNATION! 🧌");
                return;
            }
            
            // Kuongeza athari ya kutisha kabla ya alert
            document.body.style.animation = "shake 0.5s";
            setTimeout(() => { document.body.style.animation = ""; }, 500);

            alert("SUMMONING THE DARK SPIRITS TO CHECK " + prefix.value + num + "... 🦠💀🔥");
        }
    </script>
</body>
</html>
