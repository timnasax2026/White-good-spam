<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE GOOD EXPLOIT 🧌🦠</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --blood: #ff0000; --dark: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body {
            background: var(--dark);
            color: var(--neon);
            font-family: 'Courier Prime', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .hack-box {
            width: 95%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--blood);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 50px var(--blood);
            text-align: center;
            z-index: 10;
        }

        h1 { font-family: 'Creepster', cursive; color: var(--blood); font-size: 2.5rem; margin-bottom: 10px; }

        /* Nchi Zote Input */
        .input-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }

        select, input {
            background: #111;
            border: 1px solid var(--blood);
            color: var(--neon);
            padding: 15px;
            font-size: 1.1rem;
            outline: none;
            border-radius: 5px;
        }

        .btn-hack {
            background: var(--blood);
            color: #fff;
            padding: 18px;
            border: none;
            width: 100%;
            font-family: 'Creepster', cursive;
            font-size: 1.5rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-hack:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--blood); }

        /* Counter na Loader */
        #loading-screen { display: none; }
        .counter { font-size: 3rem; color: var(--blood); margin: 20px 0; }
        .status-text { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        /* Result Section */
        #result { display: none; text-align: left; background: #080000; padding: 15px; border-left: 5px solid var(--blood); }
        .details { color: #fff; font-size: 0.9rem; margin-top: 10px; }
        .virus-alert { color: var(--blood); font-weight: bold; animation: blink 0.5s infinite; }

        @keyframes blink { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="hack-box" id="main-ui">
    <h1>WHITE GOOD BYPASS 🧌</h1>
    <p style="font-size: 0.7rem;">DECRYPTING WORLDWIDE SERVERS...</p>
    
    <div class="input-row">
        <select id="country-code">
            <option value="255">Tanzania (+255)</option>
            <option value="254">Kenya (+254)</option>
            <option value="256">Uganda (+256)</option>
            <option value="243">DRC (+243)</option>
            <option value="1">USA (+1)</option>
            <option value="44">UK (+44)</option>
            <option value="27">South Africa (+27)</option>
            <option value="234">Nigeria (+234)</option>
            </select>
        <input type="number" id="target-number" placeholder="Enter Victim's Number">
    </div>

    <button class="btn-hack" onclick="startInfection()">SEND VIRUS 🦠</button>
</div>

<div class="hack-box" id="loading-screen">
    <h1>INJECTING MALWARE...</h1>
    <div class="counter" id="percent">0%</div>
    <div class="status-text" id="status-log">Accessing WhatsApp Root...</div>
</div>

<div class="hack-box" id="result-ui" style="display: none;">
    <h1 style="font-size: 1.5rem;">VICTIM COMPROMISED! 💀</h1>
    <div id="result"></div>
    <p class="virus-alert">☣️ VIRUS SUCCESSFULLY SENT TO TARGET ☣️</p>
    <button class="btn-hack" style="margin-top: 20px; font-size: 1rem;" onclick="location.reload()">TARGET NEW SOUL</button>
</div>

<script>
    // Matrix background
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "0101010101ERROR666VIRUSDEATH";
    const drops = Array(Math.floor(canvas.width/20)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        drops.forEach((y, i) => {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 40);

    // Hacking Logic
    function startInfection() {
        const num = document.getElementById('target-number').value;
        if(!num) return alert("WHO IS THE VICTIM? 🧌");

        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';

        let count = 0;
        const statusLogs = [
            "Bypassing Firebase Auth...",
            "Decrypting Media Keys...",
            "Extracting Profile Buffer...",
            "Locating GPS Coordinates...",
            "Infecting Device: TIMNASA-TMD...",
            "Uploading Trojan.exe..."
        ];

        const timer = setInterval(() => {
            count += Math.floor(Math.random() * 5) + 1;
            if(count > 100) count = 100;
            
            document.getElementById('percent').innerText = count + "%";
            document.getElementById('status-log').innerText = statusLogs[Math.floor(Math.random() * statusLogs.length)];

            if(count === 100) {
                clearInterval(timer);
                showFinal();
            }
        }, 150);
    }

    function showFinal() {
        const num = document.getElementById('target-number').value;
        const code = document.getElementById('country-code').value;
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        resDiv.innerHTML = `
            <div class="details">
                <strong>NAME:</strong> Unknown Subject<br>
                <strong>WHATSAPP ID:</strong> ${code}${num}@s.whatsapp.net<br>
                <strong>STATUS:</strong> BANNED FROM LIFE<br>
                <strong>IP:</strong> 102.44.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}<br>
                <strong>LOCATION:</strong> DAR ES SALAAM, TZ<br>
                <strong>LAST SEEN:</strong> CRYING 🧛
            </div>
        `;
    }
</script>

</body>
</html>
